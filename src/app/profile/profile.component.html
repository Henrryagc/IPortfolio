<div class="profile-card">
  <figure class="profile-card__figure">
    <img class="profile-card__image" src="assets/imgs/garou.webp" alt="Profile Picture">
  </figure>

  <header class="profile-card__header">
    <h2 class="profile-card__name">Henrry Gutierrez</h2>
    <div class="profile-card__title-wrapper">
      <h3 class="profile-card__title">{{ 'PROFILE.TITLE' | translate }}</h3>
    </div>
    <div class="profile-card__social">
      @for (item of socialMediaItems; track $index) {
        <a [href]="item.url" class="profile-card__social-link">
          <img [src]="item.icon" alt="" class="profile-card__social-icon">
        </a>
      }
    </div>
  </header>

  <hr class="profile-card__divider">

  <div class="profile-card__info">
    @for (categoryGroup of informationItems; track $index) {
      <div class="profile-card__category">
        <h4 class="profile-card__category-title">{{ categoryGroup.category }}</h4>
        <div class="profile-card__category-items">
          @for (item of categoryGroup.items; track $index) {
            <app-tooltip [text]="item.title" position="bottom">
              <div class="profile-card__info-item">
                <div class="profile-card__info-icon" [style.-webkit-mask-image]="'url(' + item.icon + ')'"
                  [style.mask-image]="'url(' + item.icon + ')'" [attr.aria-label]="item.title">
                </div>
              </div>
            </app-tooltip>
          }
        </div>
      </div>
    }
  </div>
</div>
