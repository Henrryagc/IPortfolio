<div class="profile-card">
  <figure class="profile-card__figure">
    <img class="profile-card__image" src="assets/imgs/me.jpeg" alt="Profile Picture">
  </figure>

  <header class="profile-card__header">
    <h2 class="profile-card__name">Henrry Gutierrez</h2>
    <h3 class="profile-card__title">{{ 'PROFILE.TITLE' | translate }}</h3>
    <div class="profile-card__social">
      @for (item of socialMediaItems; track $index) {
        <a [href]="item.url" class="profile-card__social-link" target="_blank" rel="noopener noreferrer">
          <div class="profile-card__social-icon" [style.-webkit-mask-image]="'url(' + item.icon + ')'"
            [style.mask-image]="'url(' + item.icon + ')'" [attr.aria-label]="'Link to ' + item.url">
          </div>
        </a>
      }
    </div>
  </header>

  <hr class="profile-card__divider">

  <div class="profile-card__info">
    <!-- Iconic Segmented Control Bar -->
    <div class="profile-card__segmented-bar">
      @for (cat of categoryIcons; track $index) {
        <app-tooltip [text]="cat.name" position="bottom">
          <button class="profile-card__segment-btn" [class.profile-card__segment-btn--active]="$index === activeIndex()"
            (click)="goTo($index)" [attr.aria-label]="'Select category ' + cat.name">
            <i class="bx" [class]="cat.icon"></i>
          </button>
        </app-tooltip>
      }
    </div>

    <!-- Active Category Content -->
    <div class="profile-card__skills-container">
      <h4 class="profile-card__current-category">
        {{ informationItems[activeIndex()].category }}
      </h4>

      <div class="profile-card__skills-grid">
        @for (item of informationItems[activeIndex()].items; track $index) {
          <div class="profile-card__tag" [style.animation-delay]="$index * 0.03 + 's'">
            <div class="profile-card__tag-icon" [style.-webkit-mask-image]="'url(' + item.icon + ')'"
              [style.mask-image]="'url(' + item.icon + ')'" [attr.aria-label]="item.title">
            </div>
            <span class="profile-card__tag-label">{{ item.title }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
