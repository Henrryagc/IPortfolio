<div class="header-tools">
    <button class="lang-toggle-btn" (click)="switchLanguage()" [attr.aria-label]="'Switch language'">
        {{ currentLang }}
    </button>
    <button class="theme-toggle-btn" (click)="toggleTheme()"
        [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <i class='bx' [class.bx-sun]="isDarkMode" [class.bx-moon]="!isDarkMode"></i>
    </button>
</div>

<app-header />

<section>
    <aside class="content">
        <app-profile />
    </aside>

    <main>
        <app-main-content />
    </main>

    <nav class="content p-0">
        <app-nav />
    </nav>
</section>

<app-footer />
